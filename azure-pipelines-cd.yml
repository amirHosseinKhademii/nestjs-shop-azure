# Azure DevOps CD: docker push → update-manifests.
#
# Mirrors .github/workflows/cd.yml. Triggered ONLY when the CI pipeline
# (azure-pipelines-ci.yml) finishes successfully on `main` or a `v*.*.*`
# release tag. Manual `trigger: none` + `pr: none` so the only way this
# pipeline runs is via the `pipelines.shop-ci` resource trigger.
#
# Required pipeline variables / service connections (set in Azure DevOps):
#
#   • Service connection (Docker Registry):  $(DOCKER_REGISTRY_CONNECTION)
#       - Type: Docker Registry → Docker Hub
#       - Used by the Docker@2 task to log in & push.
#   • Pipeline variable:  DOCKERHUB_NAMESPACE  (e.g. amir2575)
#   • For the manifest commit-back step:
#       - Pipeline variable:  GIT_USER_EMAIL   (bot email)
#       - Pipeline variable:  GIT_USER_NAME    (bot name)
#       - The build's System.AccessToken needs "Contribute" on the repo.
#         Project Settings → Repos → Permissions → Build Service →
#         Contribute = Allow.
#
# Loop-safety: the commit message includes `[skip ci]`; pushes from the
# build-service identity also do not by default re-trigger CI when the
# pipeline's `Build validation` policy is configured normally — but the
# `[skip ci]` marker is the belt-and-braces guarantee.

name: cd-$(Build.SourceBranchName)-$(Build.BuildId)

trigger: none
pr: none

resources:
  pipelines:
    - pipeline: shop-ci
      source: shop-ci         # the *display name* you give the CI pipeline
                              # in Azure DevOps when you import
                              # azure-pipelines-ci.yml
      trigger:
        branches:
          include:
            - main
        tags:
          include:
            - v*.*.*

variables:
  NODE_VERSION: '24'
  KUSTOMIZE_VERSION: '5.4.3'
  # Resolve the commit CI built. resources.pipelines.<alias>.sourceCommit is
  # the canonical "what was built" SHA we need so docker tags + kustomize
  # bumps stay in lockstep.
  CI_HEAD_SHA: $(resources.pipeline.shop-ci.sourceCommit)
  CI_HEAD_BRANCH: $(resources.pipeline.shop-ci.sourceBranch)

stages:
  - stage: Docker
    displayName: Build & push images
    jobs:
      - job: Push
        timeoutInMinutes: 20
        pool:
          vmImage: ubuntu-latest
        strategy:
          matrix:
            api-gateway: { service: api-gateway }
            user-svc:    { service: user-svc }
            shop-svc:    { service: shop-svc }
            order-svc:   { service: order-svc }
            web:         { service: web }
        steps:
          - checkout: self
            # Build the exact commit CI validated, not the tip of main.
            fetchDepth: 1

          - script: |
              set -e
              if [ -z "$(DOCKERHUB_NAMESPACE)" ]; then
                echo "##vso[task.logissue type=error]Set pipeline variable DOCKERHUB_NAMESPACE"
                exit 1
              fi
              git checkout $(CI_HEAD_SHA)
              SHORT="$(echo "$(CI_HEAD_SHA)" | cut -c1-7)"
              echo "##vso[task.setvariable variable=SHA_TAG]sha-${SHORT}"
              # Strip refs/heads/ or refs/tags/ to a bare ref name for tagging.
              REF="$(echo "$(CI_HEAD_BRANCH)" | sed -E 's#^refs/(heads|tags)/##')"
              echo "##vso[task.setvariable variable=REF_TAG]${REF}"
            displayName: Resolve tags

          - task: Docker@2
            displayName: Buildx setup (QEMU + Buildx)
            inputs:
              command: login
              containerRegistry: $(DOCKER_REGISTRY_CONNECTION)

          - task: Docker@2
            displayName: Build & push $(service) (sha-tag)
            inputs:
              command: buildAndPush
              containerRegistry: $(DOCKER_REGISTRY_CONNECTION)
              repository: $(DOCKERHUB_NAMESPACE)/shop-$(service)
              dockerfile: apps/$(service)/Dockerfile
              buildContext: '.'
              tags: |
                $(SHA_TAG)
                $(REF_TAG)

          - task: Docker@2
            displayName: Tag :latest (main only)
            condition: and(succeeded(), eq(variables['CI_HEAD_BRANCH'], 'refs/heads/main'))
            inputs:
              command: buildAndPush
              containerRegistry: $(DOCKER_REGISTRY_CONNECTION)
              repository: $(DOCKERHUB_NAMESPACE)/shop-$(service)
              dockerfile: apps/$(service)/Dockerfile
              buildContext: '.'
              tags: |
                latest

  - stage: UpdateManifests
    displayName: Bump k8s image tags
    dependsOn: Docker
    condition: succeeded()
    jobs:
      - job: Bump
        timeoutInMinutes: 5
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            persistCredentials: true     # so we can push back via System.AccessToken
            fetchDepth: 0
            clean: true

          - script: |
              set -e
              git checkout main
              git pull --ff-only origin main
            displayName: Switch to main

          - script: |
              set -e
              curl -sLo /tmp/kustomize.tar.gz \
                "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv$(KUSTOMIZE_VERSION)/kustomize_v$(KUSTOMIZE_VERSION)_linux_amd64.tar.gz"
              tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin
              kustomize version
            displayName: Install kustomize $(KUSTOMIZE_VERSION)

          - script: |
              set -e
              SHORT="$(echo "$(CI_HEAD_SHA)" | cut -c1-7)"
              TAG="sha-${SHORT}"
              echo "Bumping kustomization.yaml to ${TAG}"
              cd infra/k8s
              for svc in api-gateway web user-svc shop-svc order-svc; do
                kustomize edit set image \
                  "docker.io/$(DOCKERHUB_NAMESPACE)/shop-${svc}=docker.io/$(DOCKERHUB_NAMESPACE)/shop-${svc}:${TAG}"
              done
              echo "── kustomization.yaml after bump ──"
              cat kustomization.yaml
              echo "##vso[task.setvariable variable=SHA_TAG]${TAG}"
            displayName: Bump image tags

          - script: |
              set -e
              if git diff --quiet infra/k8s/kustomization.yaml; then
                echo "No image tag changes — nothing to commit."
                exit 0
              fi
              git config user.name  "$(GIT_USER_NAME)"
              git config user.email "$(GIT_USER_EMAIL)"
              git add infra/k8s/kustomization.yaml
              git commit -m "chore(k8s): bump image tags to $(SHA_TAG) [skip ci]"
              # System.AccessToken is injected by `persistCredentials: true`.
              git push origin HEAD:main
            displayName: Commit & push
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # Pushes `shop-app-secrets` into AKS from the corresponding pipeline
  # secret variables. Mirrors `seed-secrets` in .github/workflows/cd.yml.
  #
  # Required pipeline variables (Library / pipeline UI):
  #   • AZURE_SUBSCRIPTION    (name of an "Azure Resource Manager"
  #                            service connection — workload identity
  #                            federation preferred)
  #   • AKS_CLUSTER_NAME      (e.g. shop-demo)
  #   • AKS_RESOURCE_GROUP    (e.g. shop-demo-rg)
  #   • DATABASE_URL          (marked SECRET)
  #   • MONGO_URI             (marked SECRET)
  #   • REDIS_URL             (marked SECRET)
  #   • JWT_SECRET            (marked SECRET)
  #
  # The whole stage is skipped when AKS_CLUSTER_NAME isn't set, so the
  # pipeline stays green for image-only consumers. See
  # infra/azure/aks-overlay/Readme.md for the full bootstrap.
  - stage: SeedSecrets
    displayName: Seed cluster secrets
    dependsOn: UpdateManifests
    condition: and(succeeded(), ne(variables['AKS_CLUSTER_NAME'], ''))
    jobs:
      - job: Seed
        timeoutInMinutes: 10
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 1

          - script: |
              set -e
              missing=()
              for v in DATABASE_URL MONGO_URI REDIS_URL JWT_SECRET AKS_RESOURCE_GROUP; do
                if [ -z "${!v}" ]; then
                  missing+=("$v")
                fi
              done
              if [ ${#missing[@]} -ne 0 ]; then
                echo "##vso[task.logissue type=error]Missing required pipeline variables: ${missing[*]}"
                exit 1
              fi
              echo "All required pipeline variables present."
            displayName: Validate required pipeline variables
            env:
              # Pipe secrets in via env so they're not echoed in -x logs.
              DATABASE_URL: $(DATABASE_URL)
              MONGO_URI: $(MONGO_URI)
              REDIS_URL: $(REDIS_URL)
              JWT_SECRET: $(JWT_SECRET)
              AKS_RESOURCE_GROUP: $(AKS_RESOURCE_GROUP)

          - task: AzureCLI@2
            displayName: az aks get-credentials + seed Secret
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              # `az aks install-cli` is a no-op if kubectl is already
              # there (it is on Microsoft-hosted ubuntu-latest images).
              inlineScript: |
                set -e
                az aks install-cli --only-show-errors >/dev/null 2>&1 || true
                az aks get-credentials \
                  --resource-group "$(AKS_RESOURCE_GROUP)" \
                  --name "$(AKS_CLUSTER_NAME)" \
                  --overwrite-existing
                kubectl get nodes
                kubectl apply -f infra/k8s/namespace.yaml
                kubectl create secret generic shop-app-secrets \
                  --namespace shop \
                  --from-literal=DATABASE_URL="$DATABASE_URL" \
                  --from-literal=MONGO_URI="$MONGO_URI" \
                  --from-literal=REDIS_URL="$REDIS_URL" \
                  --from-literal=JWT_SECRET="$JWT_SECRET" \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "── secret confirmed ──"
                kubectl -n shop get secret shop-app-secrets \
                  -o jsonpath='{.metadata.name}: {.metadata.creationTimestamp}'; echo
            env:
              DATABASE_URL: $(DATABASE_URL)
              MONGO_URI: $(MONGO_URI)
              REDIS_URL: $(REDIS_URL)
              JWT_SECRET: $(JWT_SECRET)

  # Final stage: actually deploy. Picks up the bumped tags from the
  # UpdateManifests stage (re-checking out main) and applies the AKS
  # demo overlay. Mirrors `deploy-eks` in .github/workflows/cd.yml.
  - stage: Deploy
    displayName: Deploy to AKS
    dependsOn:
      - UpdateManifests
      - SeedSecrets
    condition: and(succeeded(), ne(variables['AKS_CLUSTER_NAME'], ''))
    jobs:
      - job: Apply
        timeoutInMinutes: 15
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true

          - script: |
              set -e
              git fetch origin main
              git checkout origin/main
            displayName: Check out main (post-bump, with new image tags)

          - task: AzureCLI@2
            displayName: kubectl apply -k infra/azure/aks-overlay/
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                az aks install-cli --only-show-errors >/dev/null 2>&1 || true
                az aks get-credentials \
                  --resource-group "$(AKS_RESOURCE_GROUP)" \
                  --name "$(AKS_CLUSTER_NAME)" \
                  --overwrite-existing

                # `kubectl apply -k` uses kubectl's built-in kustomize.
                kubectl apply -k infra/azure/aks-overlay/

                for d in api-gateway web user-svc shop-svc order-svc; do
                  echo "── rollout: $d ──"
                  kubectl -n shop rollout status "deployment/$d" --timeout=5m
                done

                IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
                  -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
                if [ -z "$IP" ]; then
                  echo "##vso[task.logissue type=warning]ingress-nginx LB has no public IP yet (still provisioning?)."
                  kubectl -n ingress-nginx get svc ingress-nginx-controller
                  exit 0
                fi
                echo "App is live at: http://$IP"
                echo "##vso[task.setvariable variable=APP_URL;isOutput=true]http://$IP"
