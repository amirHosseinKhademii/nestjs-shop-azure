# Reusable Azure Pipelines step template — Node 24 + pnpm via Corepack +
# `pnpm install --frozen-lockfile`. Mirrors
# .github/actions/setup-pnpm-node/action.yml.

steps:
  - checkout: self
    fetchDepth: 2

  - task: NodeTool@0
    displayName: Use Node $(NODE_VERSION)
    inputs:
      versionSpec: $(NODE_VERSION)

  - script: |
      set -e
      corepack enable
      PNPM_VER=$(node -p "require('./package.json').packageManager.replace(/^pnpm@/,'')")
      corepack prepare "pnpm@${PNPM_VER}" --activate
      pnpm --version
    displayName: Enable pnpm via Corepack

  - script: pnpm install --frozen-lockfile
    displayName: Install (pnpm)
