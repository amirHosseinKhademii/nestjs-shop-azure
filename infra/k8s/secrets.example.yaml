# Template for the `shop-app-secrets` Kubernetes Secret.
#
# In CI this Secret is created by the `seed-secrets` job in
# `.github/workflows/cd.yml` from GitHub Repository Secrets — never from
# this file. This file exists only so the schema is reviewable in code
# and so engineers running one-off manual deploys have something to copy:
#
#   cp infra/k8s/secrets.example.yaml infra/k8s/secrets.yaml
#   # edit infra/k8s/secrets.yaml with real values
#   kubectl apply -f infra/k8s/secrets.yaml
#
# infra/k8s/secrets.yaml is gitignored. Do NOT commit real values here.
apiVersion: v1
kind: Secret
metadata:
  name: shop-app-secrets
  namespace: shop
type: Opaque
stringData:
  # Postgres (Neon) — shared by user-svc and order-svc.
  DATABASE_URL: postgresql://USER:PASSWORD@HOST.neon.tech/neondb?sslmode=require

  # MongoDB Atlas (shop-svc).
  MONGO_URI: mongodb+srv://USER:PASSWORD@HOST.mongodb.net/shop?retryWrites=true&w=majority

  # Upstash Redis (shop-svc cart).
  REDIS_URL: rediss://default:PASSWORD@HOST.upstash.io:6379

  # Auth — used by gateway (verify) and user-svc (sign).
  JWT_SECRET: replace-me-with-a-long-random-string

  # Optional: Azure Service Bus (order-svc listener / shop-svc publisher).
  # SERVICEBUS_CONNECTION_STRING: Endpoint=sb://...

  # Optional: Aiven for Apache Kafka — free tier broker shared by shop-svc
  # (publisher) and order-svc (consumer). When KAFKA_BROKERS is set the
  # `auto` transport prefers Kafka over Service Bus over the HTTP fallback.
  # Sign up at https://aiven.io/free-kafka — no credit card required.
  #
  # Pick ONE auth mode:
  #
  #   A) mTLS  (Aiven's default — the console shows "Access key" + "Access
  #             certificate" instead of a password):
  #      Set KAFKA_SSL_CA + KAFKA_SSL_CERT + KAFKA_SSL_KEY.
  #      Leave KAFKA_USERNAME / KAFKA_PASSWORD unset.
  #
  #   B) SASL  (must be enabled under Authentication methods first; then a
  #             password appears next to avnadmin):
  #      Set KAFKA_SSL_CA + KAFKA_USERNAME + KAFKA_PASSWORD.
  #      Leave KAFKA_SSL_CERT / KAFKA_SSL_KEY unset.
  KAFKA_BROKERS: kafka-xxxx-yourproj.aivencloud.com:12345
  KAFKA_TOPIC: checkout-events
  KAFKA_GROUP_ID: order-svc
  # CA cert is required for both modes.
  # KAFKA_SSL_CA: |
  #   -----BEGIN CERTIFICATE-----
  #   ...Aiven-provided CA bundle...
  #   -----END CERTIFICATE-----
  # --- Option A: mTLS ---
  # KAFKA_SSL_CERT: |
  #   -----BEGIN CERTIFICATE-----
  #   ...Aiven "Access certificate"...
  #   -----END CERTIFICATE-----
  # KAFKA_SSL_KEY: |
  #   -----BEGIN PRIVATE KEY-----
  #   ...Aiven "Access key"...
  #   -----END PRIVATE KEY-----
  # --- Option B: SASL ---
  # KAFKA_USERNAME: avnadmin
  # KAFKA_PASSWORD: replace-me
