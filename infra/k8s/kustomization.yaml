# Kustomize entry point. Apply with:
#
#   kubectl apply -k infra/k8s/
#
# CI bumps the `images[*].newTag` field below to the immutable short-SHA tag
# pushed by the CD pipeline (.github/workflows/cd.yml or
# azure-pipelines-cd.yml). Anything applying this overlay (manual
# `kubectl apply -k`, ArgoCD, Flux, ...) will pick up the new tags
# automatically.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shop

resources:
- namespace.yaml
- secrets.yaml
- network-policies.yaml
- user-svc.yaml
- shop-svc.yaml
- order-svc.yaml
- api-gateway.yaml
- web.yaml
- ingress.yaml

# `name` here matches the `image:` field in the deployment YAMLs.
# `newName` is the registry path; `newTag` is bumped by CI.
images:
- name: docker.io/amir2575/shop-api-gateway
  newName: docker.io/amir2575/shop-api-gateway
  newTag: sha-c7fcf62
- name: docker.io/amir2575/shop-order-svc
  newName: docker.io/amir2575/shop-order-svc
  newTag: sha-c7fcf62
- name: docker.io/amir2575/shop-shop-svc
  newName: docker.io/amir2575/shop-shop-svc
  newTag: sha-c7fcf62
- name: docker.io/amir2575/shop-user-svc
  newName: docker.io/amir2575/shop-user-svc
  newTag: sha-c7fcf62
- name: docker.io/amir2575/shop-web
  newName: docker.io/amir2575/shop-web
  newTag: sha-c7fcf62
