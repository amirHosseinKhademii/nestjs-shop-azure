# Internal-only service. Reachable from api-gateway (reads) and shop-svc
# (HTTP checkout fallback). Storage is external (Neon Postgres, shared with
# user-svc), connection string injected from the `shop-app-secrets` Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-svc
  namespace: shop
  labels:
    app: order-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-svc
  template:
    metadata:
      labels:
        app: order-svc
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: order-svc
          image: docker.io/amir2575/shop-order-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3003
          envFrom:
            - secretRef:
                name: shop-app-secrets
          env:
            - name: PORT
              value: '3003'
            - name: NODE_ENV
              value: production
            - name: TYPEORM_SYNC
              value: 'false'
            - name: SERVICEBUS_LISTENER_ENABLED
              value: 'false'
            # KAFKA_LISTENER_ENABLED is intentionally NOT set here — the
            # listener auto-enables when KAFKA_BROKERS is present in
            # shop-app-secrets (see secrets.example.yaml). Set this env to
            # 'false' on overlays that should opt out (e.g. while migrating).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: order-svc
  namespace: shop
spec:
  type: ClusterIP
  selector:
    app: order-svc
  ports:
    - name: http
      port: 3003
      targetPort: http
