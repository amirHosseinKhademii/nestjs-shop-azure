# Grafana Alloy — single DaemonSet per node forwarding metrics, logs, and traces
# to Grafana Cloud. Requires Secret `grafana-cloud-credentials` in this namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: observability
  labels:
    app: alloy
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
  labels:
    app: alloy
rules:
  - apiGroups: ['']
    resources: [nodes, nodes/proxy, nodes/metrics, services, endpoints, pods, namespaces]
    verbs: [get, list, watch]
  # Required by `loki.source.kubernetes` to stream container logs from the
  # Kubernetes API (instead of tailing files on disk). Without this, the
  # tailer fails with: pods "<pod>" is forbidden: cannot get resource
  # "pods/log" in API group "".
  - apiGroups: ['']
    resources: [pods/log]
    verbs: [get, list, watch]
  - apiGroups: ['discovery.k8s.io']
    resources: [endpointslices]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
  labels:
    app: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: observability
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: observability
  labels:
    app: alloy
spec:
  type: ClusterIP
  selector:
    app: alloy
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: observability
  labels:
    app: alloy
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      securityContext:
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alloy
          image: docker.io/grafana/alloy:v1.7.5
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: http-metrics
              containerPort: 12345
          envFrom:
            - secretRef:
                name: grafana-cloud-credentials
          securityContext:
            privileged: true
            runAsUser: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: alloy-data
              mountPath: /var/lib/alloy/data
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: host-root
              mountPath: /host/root
              readOnly: true
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http-metrics
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http-metrics
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: alloy-data
          emptyDir: {}
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-root
          hostPath:
            path: /
            type: Directory
---
# Optional: scrape Alloy's own HTTP server (self-metrics) — not wired in River
# config above; enable later if you add prometheus.exporter.self.
