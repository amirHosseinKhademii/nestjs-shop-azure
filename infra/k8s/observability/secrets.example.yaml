# Copy to secrets-grafana.yaml (gitignored) and apply, OR use
# infra/local/minikube-overlay/seed-secrets.mjs which reads the same keys from .env
#
#   kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f secrets-grafana.yaml
#
# Never commit real API keys.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-credentials
  namespace: observability
type: Opaque
stringData:
  # ── Mimir (Prometheus remote_write) ─────────────────────────────
  MIMIR_REMOTE_WRITE_URL: 'https://prometheus-prod-XX-prod-XX-XX.grafana.net/api/prom/push'
  MIMIR_USER: '123456'
  MIMIR_API_KEY: 'glc_...'

  # ── Loki (log push) ─────────────────────────────────────────────
  LOKI_URL: 'https://logs-prod-XX.grafana.net/loki/api/v1/push'
  LOKI_USER: '123456'
  LOKI_API_KEY: 'glc_...'

  # ── Tempo (OTLP HTTP) ───────────────────────────────────────────
  TEMPO_OTLP_URL: 'https://tempo-prod-XX-prod-XX-XX.grafana.net/otlp'
  TEMPO_USER: '123456'
  TEMPO_API_KEY: 'glc_...'

  # ── Faro (browser RUM — also duplicated in web ConfigMap) ───────
  FARO_URL: 'https://faro-collector-prod-XX-XX-XX.grafana.net'
  FARO_APP_KEY: '...'
