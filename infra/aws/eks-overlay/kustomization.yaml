# Kustomize overlay for one-shot EKS demo deploys.
#
#   kubectl apply -k infra/aws/eks-overlay/
#
# Topology stays the same as production: ingress-nginx is the ONLY public
# surface, and routes:
#   /         → web         (static SPA, served by nginx-unprivileged)
#   /graphql  → api-gateway (NestJS GraphQL)
#
# All backend services (web, api-gateway, user-svc, shop-svc, order-svc)
# remain ClusterIP — exactly as in production.
#
# Differences from infra/k8s/ (production base):
#   1. The Ingress is patched so it works on a raw ELB hostname:
#        - drops `tls:` block (no cert-manager in demo)
#        - drops `cert-manager.io/cluster-issuer` annotation
#        - flips `ssl-redirect` / `force-ssl-redirect` / `hsts` off
#        - removes `host:` so any DNS name pointed at the ingress-nginx
#          ELB matches (nip.io, /etc/hosts, etc.)
#
# Prerequisites in the cluster (one-time, install AFTER eksctl create):
#
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm repo update
#   helm install ingress-nginx ingress-nginx/ingress-nginx \
#     --namespace ingress-nginx --create-namespace \
#     --set controller.service.type=LoadBalancer
#
#   # Wait ~2 min, then grab the AWS ELB DNS:
#   kubectl -n ingress-nginx get svc ingress-nginx-controller \
#     -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
#
# That hostname is what you open in the browser.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../k8s

patches:
  - target:
      kind: Ingress
      name: shop
    patch: |-
      - op: remove
        path: /spec/tls
      - op: remove
        path: /spec/rules/0/host
      - op: remove
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
      - op: replace
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1ssl-redirect
        value: "false"
      - op: replace
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1force-ssl-redirect
        value: "false"
      - op: replace
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1hsts
        value: "false"
