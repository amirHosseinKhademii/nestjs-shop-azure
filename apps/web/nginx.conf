server {
  # nginx-unprivileged binds to 8080 by default (UID 101, no CAP_NET_BIND).
  listen 8080;
  server_name _;

  # In production the Ingress routes /graphql directly to api-gateway,
  # so this proxy block is only used in local docker-compose where the
  # SPA hits the same origin (web) for both static and graphql.
  location /graphql {
    proxy_pass http://api-gateway:3000/graphql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
