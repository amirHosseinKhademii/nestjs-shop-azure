server {
  # nginx-unprivileged binds to 8080 by default (UID 101, no CAP_NET_BIND).
  listen 8080;
  server_name _;

  # ── Security headers (apply to every response, even errors) ───────────────
  add_header X-Content-Type-Options       "nosniff"                                 always;
  add_header X-Frame-Options              "DENY"                                    always;
  add_header Referrer-Policy              "strict-origin-when-cross-origin"         always;
  add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()" always;
  add_header Cross-Origin-Opener-Policy   "same-origin"                             always;
  add_header Cross-Origin-Resource-Policy "same-origin"                             always;
  # HSTS is normally added by the Ingress (over real TLS); harmless if duplicated.
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # In production the Ingress routes /graphql directly to api-gateway,
  # so this proxy block is only used in local docker-compose where the
  # SPA hits the same origin (web) for both static and graphql.
  location /graphql {
    proxy_pass http://api-gateway:3000/graphql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;

    # Long-cache hashed Vite assets, but never cache the entry HTML.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
    location = /index.html {
      add_header Cache-Control "no-cache";
    }
  }
}
