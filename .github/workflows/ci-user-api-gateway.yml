name: CI — user-svc & api-gateway

on:
  push:
    branches: [main]
    paths:
      - 'apps/user-svc/**'
      - 'apps/api-gateway/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-user-api-gateway.yml'
      - '.github/actions/**'
      - '.prettierrc'
      - '.prettierignore'
      - 'apps/user-svc/eslint.config.mjs'
      - 'apps/user-svc/jest.config.cjs'
      - 'apps/user-svc/tsconfig.build.json'
      - 'apps/api-gateway/eslint.config.mjs'
      - 'apps/api-gateway/jest.config.cjs'
      - 'apps/api-gateway/tsconfig.build.json'
      - 'apps/user-svc/Dockerfile'
      - 'apps/api-gateway/Dockerfile'
  pull_request:
    branches: [main]
    paths:
      - 'apps/user-svc/**'
      - 'apps/api-gateway/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-user-api-gateway.yml'
      - '.github/actions/**'
      - '.prettierrc'
      - '.prettierignore'
      - 'apps/user-svc/eslint.config.mjs'
      - 'apps/user-svc/jest.config.cjs'
      - 'apps/user-svc/tsconfig.build.json'
      - 'apps/api-gateway/eslint.config.mjs'
      - 'apps/api-gateway/jest.config.cjs'
      - 'apps/api-gateway/tsconfig.build.json'
      - 'apps/user-svc/Dockerfile'
      - 'apps/api-gateway/Dockerfile'

concurrency:
  group: ci-user-gateway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Pre build (format, lint, typecheck, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Prettier
        run: pnpm run format:check

      - name: ESLint
        run: pnpm run lint:services

      - name: Typecheck
        run: pnpm run typecheck:services

      - name: Test
        run: pnpm run test:services

  build:
    name: Build (Nest)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm run build:services

  docker:
    name: Containerize (tag only)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Docker build context
        run: mkdir -p packages

      - name: Docker build user-svc
        run: |
          docker build \
            -f apps/user-svc/Dockerfile \
            -t shop-nest/user-svc:${{ github.sha }} \
            -t shop-nest/user-svc:ci \
            .

      - name: Docker build api-gateway
        run: |
          docker build \
            -f apps/api-gateway/Dockerfile \
            -t shop-nest/api-gateway:${{ github.sha }} \
            -t shop-nest/api-gateway:ci \
            .

      - name: List images
        run: |
          echo "user-svc"
          docker images shop-nest/user-svc --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'
          echo "api-gateway"
          docker images shop-nest/api-gateway --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'
