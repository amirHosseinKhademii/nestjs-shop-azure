# ─────────────────────────────────────────────────────────────────────────────
#  CD — docker → update-manifests → {seed-secrets, seed-secrets-aks}
#                                 → {deploy,       deploy-aks}
#
#  Triggered automatically after CI passes on `main` or a `v*.*.*` tag, or
#  manually via "Run workflow" (workflow_dispatch).
#
#  Job graph (the two cloud branches run in parallel after the bump):
#
#                                            ┌─► seed-secrets     ─► deploy      (EKS)
#    docker (matrix×5) ─► update-manifests ──┤
#                                            └─► seed-secrets-aks ─► deploy-aks  (AKS)
#
#  Notes for anyone editing this file:
#    • Workflow-level `permissions: contents: read` — every job opts INTO any
#      extra scope it needs (`packages: write`, `id-token: write`, etc.).
#    • Each job resolves its own values inline (DH namespace, image tag, …).
#      We tried a centralized `prepare` job that exposed those as outputs;
#      `needs.prepare.outputs.namespace` came back empty in the docker job
#      for reasons we couldn't pin down on this repo, so we reverted.
#    • EKS branch (`seed-secrets`, `deploy`)         auto-skips when
#      `vars.EKS_CLUSTER_NAME` is unset.
#    • AKS branch (`seed-secrets-aks`, `deploy-aks`) auto-skips when
#      `vars.AKS_CLUSTER_NAME` is unset.
#      Both unset = workflow finishes after `update-manifests`, perfect for
#      contributors who only consume images.
#    • `deploy` / `deploy-aks` use a GitHub Environment (`production-eks` /
#      `production-aks`) which gives you a clickable URL on the run page +
#      a Deployments timeline under Settings → Environments + an obvious
#      place to attach approval rules when this leaves demo territory.
# ─────────────────────────────────────────────────────────────────────────────
name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running CD manually? (shows up in logs)'
        required: false
        default: 'manual deploy'

permissions:
  contents: read

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  # ─── 1. Build + push every service image in parallel ─────────────────────
  docker:
    name: Build & push · ${{ matrix.service }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'main' ||
        startsWith(github.event.workflow_run.head_branch, 'v')))
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write     # future-proof for GHCR push
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-svc, shop-svc, order-svc, web]
    steps:
      - name: Resolve commit SHA + branch
        id: ctx
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            SHA="${{ github.sha }}"
            BRANCH="${{ github.ref_name }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          fi
          {
            echo "sha=$SHA"
            echo "branch=$BRANCH"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout (commit ${{ steps.ctx.outputs.sha }})
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ctx.outputs.sha }}

      - name: Resolve Docker Hub namespace
        id: ns
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "::error::Set repo variable DOCKERHUB_NAMESPACE or secret DOCKERHUB_USERNAME"
            exit 1
          fi
          echo "namespace=$DOCKERHUB_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ns.outputs.namespace }}/shop-${{ matrix.service }}
          tags: |
            type=sha,format=short,prefix=sha-,sha=${{ steps.ctx.outputs.sha }}
            type=raw,value=${{ steps.ctx.outputs.branch }}
            type=raw,value=latest,enable=${{ steps.ctx.outputs.branch == 'main' }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=shop-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=shop-${{ matrix.service }}
          provenance: false

      - name: Job summary
        if: always()
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          {
            echo "## docker · \`${{ matrix.service }}\` → **${{ job.status }}**"
            echo ""
            echo "Tags pushed:"
            echo ""
            echo "$TAGS" | sed 's|^|- `|;s|$|`|'
            if [ -n "$DIGEST" ]; then
              echo ""
              echo "Digest: \`$DIGEST\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 2. Bump kustomization image tags + commit back to main ──────────────
  update-manifests:
    name: Bump k8s image tags
    needs: docker
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write     # to push the bump commit back to main
    outputs:
      bumped_sha: ${{ steps.commit.outputs.bump_sha }}
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve Docker Hub namespace
        id: ns
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "::error::Set repo variable DOCKERHUB_NAMESPACE or secret DOCKERHUB_USERNAME"
            exit 1
          fi
          echo "namespace=$DOCKERHUB_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Compute tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            SHA="${{ github.sha }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          SHORT="${SHA:0:7}"
          echo "value=sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Bump image tags
        working-directory: infra/k8s
        env:
          NS: ${{ steps.ns.outputs.namespace }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          for svc in api-gateway web user-svc shop-svc order-svc; do
            kustomize edit set image \
              "docker.io/${NS}/shop-${svc}=docker.io/${NS}/shop-${svc}:${TAG}"
          done
          echo "── kustomization.yaml after bump ──"
          cat kustomization.yaml

      - name: Commit & push
        id: commit
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          if git diff --quiet infra/k8s/kustomization.yaml; then
            echo "::notice::Image tags already at ${TAG} — no commit needed."
            {
              echo "## Manifest bump → **skipped**"
              echo ""
              echo "Image tags in \`infra/k8s/kustomization.yaml\` already point at \`${TAG}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/kustomization.yaml
          git commit -m "chore(k8s): bump image tags to ${TAG} [skip ci]"
          git push origin HEAD:main
          BUMP=$(git rev-parse HEAD)
          echo "bump_sha=$BUMP" >> "$GITHUB_OUTPUT"
          {
            echo "## Manifest bump → **committed**"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| New tag       | \`${TAG}\` |"
            echo "| Bump commit   | \`${BUMP:0:7}\` (full: \`$BUMP\`) |"
            echo "| Pushed to     | \`main\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 3. Seed shop-app-secrets in the cluster from GH Secrets ─────────────
  seed-secrets:
    name: Seed cluster secrets
    needs: update-manifests
    if: vars.EKS_CLUSTER_NAME != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      id-token: write     # OIDC -> AWS IAM role assumption
      contents: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Validate required Secrets are set
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          missing=()
          for v in AWS_ROLE_TO_ASSUME DATABASE_URL MONGO_URI REDIS_URL JWT_SECRET; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required Secrets: ${missing[*]}"
            echo "::error::Set them in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required Secrets present."

      - name: Configure AWS + kubectl
        uses: ./.github/actions/aws-eks-kubectl
        with:
          aws-role: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          eks-cluster: ${{ vars.EKS_CLUSTER_NAME }}

      - name: Ensure shop namespace exists
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Apply shop-app-secrets (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          # Optional broker creds — kept out of the required-set check above so
          # users without these stays green. We pass them through only when set.
          SERVICEBUS_CONNECTION_STRING: ${{ secrets.SERVICEBUS_CONNECTION_STRING }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          KAFKA_SSL_CA: ${{ secrets.KAFKA_SSL_CA }}
          KAFKA_SSL_CERT: ${{ secrets.KAFKA_SSL_CERT }}
          KAFKA_SSL_KEY: ${{ secrets.KAFKA_SSL_KEY }}
          KAFKA_TOPIC: ${{ secrets.KAFKA_TOPIC }}
          KAFKA_GROUP_ID: ${{ secrets.KAFKA_GROUP_ID }}
        run: |
          set -euo pipefail
          args=(
            --from-literal=DATABASE_URL="$DATABASE_URL"
            --from-literal=MONGO_URI="$MONGO_URI"
            --from-literal=REDIS_URL="$REDIS_URL"
            --from-literal=JWT_SECRET="$JWT_SECRET"
          )
          for v in SERVICEBUS_CONNECTION_STRING \
                   KAFKA_BROKERS KAFKA_USERNAME KAFKA_PASSWORD \
                   KAFKA_SSL_CA KAFKA_SSL_CERT KAFKA_SSL_KEY \
                   KAFKA_TOPIC KAFKA_GROUP_ID; do
            if [ -n "${!v:-}" ]; then
              args+=(--from-literal="${v}=${!v}")
            fi
          done
          kubectl create secret generic shop-app-secrets \
            --namespace shop \
            "${args[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          if [ '${{ job.status }}' = 'success' ]; then
            TS=$(kubectl -n shop get secret shop-app-secrets \
                   -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || echo unknown)
            {
              echo "## seed-secrets → **success**"
              echo ""
              echo "\`shop-app-secrets\` confirmed in namespace \`shop\` (created **$TS**)."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## seed-secrets → **${{ job.status }}**" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── 4. Apply the EKS overlay + wait for rollout ─────────────────────────
  deploy:
    name: Deploy to EKS
    needs: [update-manifests, seed-secrets]
    if: vars.EKS_CLUSTER_NAME != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    environment:
      name: production-eks
      url: ${{ steps.url.outputs.app_url }}
    steps:
      # If update-manifests committed a bump, deploy that exact SHA so we
      # never race a concurrent push. Falls back to main HEAD when nothing
      # was bumped (re-run with no code change → manifests already current).
      - name: Checkout deploy ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-manifests.outputs.bumped_sha || 'main' }}
          fetch-depth: 1

      - name: Configure AWS + kubectl
        uses: ./.github/actions/aws-eks-kubectl
        with:
          aws-role: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          eks-cluster: ${{ vars.EKS_CLUSTER_NAME }}

      - name: Apply EKS overlay (kubectl built-in kustomize)
        run: |
          set -euo pipefail
          kubectl apply -k infra/aws/eks-overlay/

      - name: Wait for rollout (5m per deployment)
        run: |
          set -euo pipefail
          {
            echo "## Rollout"
            echo ""
            echo "| Deployment | Result |"
            echo "| --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"
          fail=0
          for d in api-gateway web user-svc shop-svc order-svc; do
            echo "── rollout: $d ──"
            if kubectl -n shop rollout status "deployment/$d" --timeout=5m; then
              echo "| \`$d\` | OK |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$d\` | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
              fail=1
            fi
          done
          exit "$fail"

      - name: Resolve public URL
        id: url
        run: |
          set -euo pipefail
          HOST=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
                   -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -z "$HOST" ]; then
            echo "::warning::ingress-nginx ELB has no hostname yet (still provisioning?)"
            kubectl -n ingress-nginx get svc ingress-nginx-controller
            exit 0
          fi
          URL="http://$HOST"
          echo "app_url=$URL" >> "$GITHUB_OUTPUT"
          {
            echo "## Live URL"
            echo ""
            echo "[$URL]($URL)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 5. Seed shop-app-secrets in AKS from GH Secrets ─────────────────────
  #
  # Twin of `seed-secrets` above, but talks to AKS via federated Azure login
  # instead of AWS STS. Auto-skips whenever vars.AKS_CLUSTER_NAME is unset
  # so EKS-only / image-only consumers see no failures.
  seed-secrets-aks:
    name: Seed cluster secrets (AKS)
    needs: update-manifests
    if: vars.AKS_CLUSTER_NAME != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      id-token: write     # federated OIDC -> Azure
      contents: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Validate required Secrets + Variables are set
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
        run: |
          set -euo pipefail
          missing_secrets=()
          for v in AZURE_CLIENT_ID DATABASE_URL MONGO_URI REDIS_URL JWT_SECRET; do
            [ -n "${!v:-}" ] || missing_secrets+=("$v")
          done
          missing_vars=()
          for v in AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AKS_RESOURCE_GROUP AKS_CLUSTER_NAME; do
            [ -n "${!v:-}" ] || missing_vars+=("$v")
          done
          if [ ${#missing_secrets[@]} -ne 0 ] || [ ${#missing_vars[@]} -ne 0 ]; then
            [ ${#missing_secrets[@]} -ne 0 ] && \
              echo "::error::Missing required Secrets: ${missing_secrets[*]}"
            [ ${#missing_vars[@]} -ne 0 ] && \
              echo "::error::Missing required Variables: ${missing_vars[*]}"
            echo "::error::Configure them in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required Secrets and Variables present."

      - name: Configure Azure + kubectl
        uses: ./.github/actions/azure-aks-kubectl
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Ensure shop namespace exists
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Apply shop-app-secrets (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          # Optional broker creds — kept out of the required-set check above so
          # users without these stays green. We pass them through only when set.
          SERVICEBUS_CONNECTION_STRING: ${{ secrets.SERVICEBUS_CONNECTION_STRING }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          KAFKA_SSL_CA: ${{ secrets.KAFKA_SSL_CA }}
          KAFKA_SSL_CERT: ${{ secrets.KAFKA_SSL_CERT }}
          KAFKA_SSL_KEY: ${{ secrets.KAFKA_SSL_KEY }}
          KAFKA_TOPIC: ${{ secrets.KAFKA_TOPIC }}
          KAFKA_GROUP_ID: ${{ secrets.KAFKA_GROUP_ID }}
        run: |
          set -euo pipefail
          args=(
            --from-literal=DATABASE_URL="$DATABASE_URL"
            --from-literal=MONGO_URI="$MONGO_URI"
            --from-literal=REDIS_URL="$REDIS_URL"
            --from-literal=JWT_SECRET="$JWT_SECRET"
          )
          for v in SERVICEBUS_CONNECTION_STRING \
                   KAFKA_BROKERS KAFKA_USERNAME KAFKA_PASSWORD \
                   KAFKA_SSL_CA KAFKA_SSL_CERT KAFKA_SSL_KEY \
                   KAFKA_TOPIC KAFKA_GROUP_ID; do
            if [ -n "${!v:-}" ]; then
              args+=(--from-literal="${v}=${!v}")
            fi
          done
          kubectl create secret generic shop-app-secrets \
            --namespace shop \
            "${args[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          if [ '${{ job.status }}' = 'success' ]; then
            TS=$(kubectl -n shop get secret shop-app-secrets \
                   -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || echo unknown)
            {
              echo "## seed-secrets-aks → **success**"
              echo ""
              echo "\`shop-app-secrets\` confirmed in namespace \`shop\` (created **$TS**)."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## seed-secrets-aks → **${{ job.status }}**" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── 6. Apply the AKS overlay + wait for rollout ─────────────────────────
  #
  # Twin of `deploy` above. Differences:
  #   • Reads the public IP (Azure Standard LB) instead of the hostname (AWS ELB).
  #   • Uses production-aks GitHub Environment so deploys show up under a
  #     separate timeline (lets you attach AKS-specific reviewers).
  deploy-aks:
    name: Deploy to AKS
    needs: [update-manifests, seed-secrets-aks]
    if: vars.AKS_CLUSTER_NAME != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    environment:
      name: production-aks
      url: ${{ steps.url.outputs.app_url }}
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update-manifests.outputs.bumped_sha || 'main' }}
          fetch-depth: 1

      - name: Configure Azure + kubectl
        uses: ./.github/actions/azure-aks-kubectl
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Apply AKS overlay (kubectl built-in kustomize)
        run: |
          set -euo pipefail
          kubectl apply -k infra/azure/aks-overlay/

      - name: Wait for rollout (5m per deployment)
        run: |
          set -euo pipefail
          {
            echo "## Rollout (AKS)"
            echo ""
            echo "| Deployment | Result |"
            echo "| --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"
          fail=0
          for d in api-gateway web user-svc shop-svc order-svc; do
            echo "── rollout: $d ──"
            if kubectl -n shop rollout status "deployment/$d" --timeout=5m; then
              echo "| \`$d\` | OK |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$d\` | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
              fail=1
            fi
          done
          exit "$fail"

      - name: Resolve public URL
        id: url
        run: |
          set -euo pipefail
          IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
                 -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$IP" ]; then
            echo "::warning::ingress-nginx Azure LB has no IP yet (still provisioning?)"
            kubectl -n ingress-nginx get svc ingress-nginx-controller
            exit 0
          fi
          # nip.io gives a free hostname so browsers + ingress host rules cope.
          URL="http://${IP}.nip.io"
          echo "app_url=$URL" >> "$GITHUB_OUTPUT"
          {
            echo "## Live URL (AKS)"
            echo ""
            echo "[$URL]($URL)"
          } >> "$GITHUB_STEP_SUMMARY"
