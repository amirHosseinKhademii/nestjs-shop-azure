# ─────────────────────────────────────────────────────────────────────────────
#  CD — prepare → docker → update-manifests → seed-secrets → deploy
#
#  Triggered automatically after CI passes on `main` or a `v*.*.*` tag, or
#  manually via the "Run workflow" button (workflow_dispatch).
#
#  Job graph (linear so the run page reads top-to-bottom):
#
#    prepare ──► docker (matrix × 5) ──► update-manifests ──► seed-secrets ──► deploy
#       │                                                          │            │
#       └──────────────── outputs (sha, tag, namespace …) ─────────┴────────────┘
#
#  Best-practice notes for anyone editing this file:
#    • Workflow-level `permissions: contents: read` — every job opts INTO any
#      extra scope it needs (`packages: write`, `id-token: write`, etc).
#    • `prepare` resolves "what we're shipping" once and exposes it as outputs
#      so downstream jobs never re-derive it (no drift, single summary block).
#    • Docker, AWS-OIDC, and kubectl-to-EKS are all isolated to the smallest
#      job that needs them. Everything cluster-related goes through the
#      reusable composite at .github/actions/aws-eks-kubectl/.
#    • The `deploy` job uses a **GitHub Environment** (`production-eks`),
#      which:
#        – exposes a clickable URL on the run page,
#        – produces a Deployments timeline under Settings → Environments,
#        – is the place to add manual approval / wait-timer protection rules
#          when this leaves demo territory.
#    • `seed-secrets` and `deploy` auto-skip when `vars.EKS_CLUSTER_NAME` is
#      unset, so the workflow stays green for users who only consume images.
#    • `workflow_dispatch` lets ops re-deploy from the UI without a code push
#      (e.g. after rotating a Secret in GitHub).
# ─────────────────────────────────────────────────────────────────────────────
name: CD

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running CD manually? (shows up in the summary)"
        required: false
        default: "manual deploy"

permissions:
  contents: read

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  # ─── 0. Resolve build context, gate the whole pipeline once ──────────────
  prepare:
    name: Resolve build context
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'main' ||
        startsWith(github.event.workflow_run.head_branch, 'v')))
    outputs:
      sha: ${{ steps.ctx.outputs.sha }}
      short_sha: ${{ steps.ctx.outputs.short_sha }}
      branch: ${{ steps.ctx.outputs.branch }}
      tag: ${{ steps.ctx.outputs.tag }}
      namespace: ${{ steps.ctx.outputs.namespace }}
      is_main: ${{ steps.ctx.outputs.is_main }}
      eks_enabled: ${{ steps.ctx.outputs.eks_enabled }}
    steps:
      - name: Compute context + write summary
        id: ctx
        env:
          # Read DH username straight from the same Secret docker/login-action
          # uses. We tried `vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME`
          # and got an empty value at runtime even with the Variable defined,
          # so we sidestep the `||` fallback entirely. Login already proves
          # this Secret is set; reusing it is the bulletproof source of truth.
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
          DISPATCH_REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            SHA="${{ github.sha }}"
            BRANCH="${{ github.ref_name }}"
            TRIGGER="manual ($DISPATCH_REASON)"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            TRIGGER="ci-success"
          fi

          # Defensive: print resolved length (not value) so empty secrets are
          # easy to spot in logs without exposing actual content.
          echo "DOCKERHUB_NAMESPACE length: ${#DOCKERHUB_NAMESPACE}"

          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "::error::secrets.DOCKERHUB_USERNAME is empty. Set it in Settings → Secrets and variables → Actions → Secrets."
            exit 1
          fi

          SHORT="${SHA:0:7}"
          TAG="sha-${SHORT}"
          IS_MAIN=false; [ "$BRANCH" = 'main' ] && IS_MAIN=true
          EKS=false;     [ -n "$EKS_CLUSTER_NAME" ] && EKS=true

          {
            echo "sha=$SHA"
            echo "short_sha=$SHORT"
            echo "branch=$BRANCH"
            echo "tag=$TAG"
            echo "namespace=$DOCKERHUB_NAMESPACE"
            echo "is_main=$IS_MAIN"
            echo "eks_enabled=$EKS"
          } >> "$GITHUB_OUTPUT"

          {
            echo "# Build context"
            echo ""
            echo "| Key | Value |"
            echo "| --- | --- |"
            echo "| Trigger          | \`$TRIGGER\` |"
            echo "| Branch / ref     | \`$BRANCH\` |"
            echo "| Commit           | \`$SHA\` |"
            echo "| Image tag        | \`$TAG\` |"
            echo "| Docker namespace | \`$DOCKERHUB_NAMESPACE\` |"
            echo "| \`:latest\` push?  | $IS_MAIN |"
            echo "| EKS deploy?      | $EKS |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 1. Build + push every service image in parallel ─────────────────────
  docker:
    name: Build & push · ${{ matrix.service }}
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write # future-proof for GHCR push
    strategy:
      fail-fast: false
      matrix:
        service: [ api-gateway, user-svc, shop-svc, order-svc, web ]
    env:
      IMAGE: ${{ needs.prepare.outputs.namespace }}/shop-${{ matrix.service }}
    steps:
      - name: Checkout (commit ${{ needs.prepare.outputs.short_sha }})
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=${{ needs.prepare.outputs.branch }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_main == 'true' }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=shop-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=shop-${{ matrix.service }}
          provenance: false

      - name: Job summary
        if: always()
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          {
            echo "## docker · \`${{ matrix.service }}\` → **${{ job.status }}**"
            echo ""
            echo "Tags pushed:"
            echo ""
            echo "$TAGS" | sed 's|^|- `|;s|$|`|'
            if [ -n "$DIGEST" ]; then
              echo ""
              echo "Digest: \`$DIGEST\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 2. Bump kustomization image tags + commit back to main ──────────────
  update-manifests:
    name: Bump k8s image tags
    needs: [ prepare, docker ]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write # to push the bump commit back to main
    outputs:
      bumped_sha: ${{ steps.commit.outputs.bump_sha }}
      skipped: ${{ steps.commit.outputs.skipped }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Bump image tags in infra/k8s/kustomization.yaml
        working-directory: infra/k8s
        env:
          NS: ${{ needs.prepare.outputs.namespace }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          for svc in api-gateway web user-svc shop-svc order-svc; do
            kustomize edit set image \
              "docker.io/${NS}/shop-${svc}=docker.io/${NS}/shop-${svc}:${TAG}"
          done
          echo "── kustomization.yaml after bump ──"
          cat kustomization.yaml

      - name: Commit & push
        id: commit
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet infra/k8s/kustomization.yaml; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Image tags already at ${TAG} — no commit needed."
            {
              echo "## Manifest bump → **skipped**"
              echo ""
              echo "Image tags in \`infra/k8s/kustomization.yaml\` already point at \`${TAG}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/kustomization.yaml
          git commit -m "chore(k8s): bump image tags to ${TAG} [skip ci]"
          git push origin HEAD:main
          BUMP=$(git rev-parse HEAD)
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "bump_sha=$BUMP" >> "$GITHUB_OUTPUT"
          {
            echo "## Manifest bump → **committed**"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| New tag       | \`${TAG}\` |"
            echo "| Bump commit   | \`${BUMP:0:7}\` (full: \`$BUMP\`) |"
            echo "| Pushed to     | \`main\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 3. Seed shop-app-secrets in the cluster from GH Secrets ─────────────
  seed-secrets:
    name: Seed cluster secrets
    needs: [ prepare, update-manifests ]
    if: needs.prepare.outputs.eks_enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      id-token: write # OIDC -> AWS IAM role assumption
      contents: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Validate required Secrets are set
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          missing=()
          for v in AWS_ROLE_TO_ASSUME DATABASE_URL MONGO_URI REDIS_URL JWT_SECRET; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required Secrets: ${missing[*]}"
            echo "::error::Set them in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required Secrets present."

      - name: Configure AWS + kubectl
        uses: ./.github/actions/aws-eks-kubectl
        with:
          aws-role: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          eks-cluster: ${{ vars.EKS_CLUSTER_NAME }}

      - name: Ensure shop namespace exists
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Apply shop-app-secrets (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          # `--dry-run=client -o yaml | kubectl apply -f -` is the canonical
          # "create or update" pattern for Secrets — never errors on re-runs.
          kubectl create secret generic shop-app-secrets \
            --namespace shop \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=MONGO_URI="$MONGO_URI" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          if [ '${{ job.status }}' = 'success' ]; then
            TS=$(kubectl -n shop get secret shop-app-secrets \
                   -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || echo unknown)
            {
              echo "## seed-secrets → **success**"
              echo ""
              echo "\`shop-app-secrets\` confirmed in namespace \`shop\` (created **$TS**)."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## seed-secrets → **${{ job.status }}**" >> "$GITHUB_STEP_SUMMARY"
          fi
