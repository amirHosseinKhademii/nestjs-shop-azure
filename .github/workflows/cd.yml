# CD: docker push → update-manifests.
#
# Triggered AFTER the CI workflow finishes successfully on `main` or a
# `v*.*.*` release tag. PR runs of CI never trigger CD.
#
# Why `workflow_run` instead of a `push` trigger:
#   - Guarantees CD never runs unless lint/typecheck/test/build all passed.
#   - Single source of truth for image promotion: green CI → ship.
#   - Pushes from GITHUB_TOKEN do not re-trigger workflows, so the
#     manifests-bump commit is loop-safe.
name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build & push image (${{ matrix.service }})
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' ||
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-svc, shop-svc, order-svc, web]
    steps:
      - name: Checkout (the exact commit CI ran against)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve namespace
        id: ns
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "::error::Set repo variable DOCKERHUB_NAMESPACE (Settings → Variables) or secret DOCKERHUB_USERNAME"
            exit 1
          fi
          echo "namespace=$DOCKERHUB_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ns.outputs.namespace }}/shop-${{ matrix.service }}
          # workflow_run-triggered runs report event=workflow_run, so the
          # `type=ref` and `type=semver` rules need an explicit ref to work
          # against the upstream CI run's head ref.
          tags: |
            type=sha,format=short,prefix=sha-,sha=${{ github.event.workflow_run.head_sha }}
            type=raw,value=${{ github.event.workflow_run.head_branch }}
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'main' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=shop-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=shop-${{ matrix.service }}
          provenance: false

  # Bumps `infra/k8s/kustomization.yaml` to the immutable short-SHA tag the
  # docker job just pushed, then commits back to main. ArgoCD / Flux (or a
  # manual `kubectl apply -k infra/k8s/`) will pick up the new tags.
  update-manifests:
    name: Bump k8s image tags
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve namespace
        id: ns
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "::error::Set repo variable DOCKERHUB_NAMESPACE or secret DOCKERHUB_USERNAME"
            exit 1
          fi
          echo "namespace=$DOCKERHUB_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Compute tag
        id: tag
        run: |
          # Same shape as docker/metadata-action's `type=sha,format=short`.
          SHORT="$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)"
          echo "value=sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Bump image tags
        working-directory: infra/k8s
        env:
          NS: ${{ steps.ns.outputs.namespace }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          for svc in api-gateway web user-svc shop-svc order-svc; do
            kustomize edit set image \
              "docker.io/${NS}/shop-${svc}=docker.io/${NS}/shop-${svc}:${TAG}"
          done
          echo "── kustomization.yaml after bump ──"
          cat kustomization.yaml

      - name: Commit & push
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          if git diff --quiet infra/k8s/kustomization.yaml; then
            echo "No image tag changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/kustomization.yaml
          git commit -m "chore(k8s): bump image tags to ${TAG} [skip ci]"
          git push origin HEAD:main

  # Pushes the `shop-app-secrets` Secret into the EKS cluster from the
  # corresponding GitHub Repository Secrets. Runs after every successful CD
  # so a rotation = update the secret in GitHub + re-run the workflow.
  #
  # No secret manifest is ever stored in the repo. The Secret is created
  # idempotently via `kubectl apply` of a dry-run-rendered YAML, so re-runs
  # update existing values rather than failing on conflict.
  #
  # Skips automatically if the EKS deploy hasn't been wired up yet
  # (vars.EKS_CLUSTER_NAME unset). That keeps the CD green for users who
  # only care about image push + manifest bump.
  seed-secrets:
    name: Seed cluster secrets
    needs: update-manifests
    if: vars.EKS_CLUSTER_NAME != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write     # required for OIDC -> AWS IAM role assumption
      contents: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Validate required secrets / vars are set
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          missing=()
          for v in AWS_ROLE_TO_ASSUME AWS_REGION DATABASE_URL MONGO_URI REDIS_URL JWT_SECRET; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets/vars: ${missing[*]}"
            echo "::error::Set them in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets/vars present."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Point kubectl at the EKS cluster
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          kubectl get nodes

      - name: Ensure namespace exists
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Seed shop-app-secrets (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # `--dry-run=client -o yaml | kubectl apply -f -` is the canonical
          # "create or update" pattern for Secrets — it never errors on the
          # second run and triggers a rolling restart of any Pod whose
          # container envFrom's this Secret (when paired with reloader, etc).
          kubectl create secret generic shop-app-secrets \
            --namespace shop \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=MONGO_URI="$MONGO_URI" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "── secret confirmed ──"
          kubectl -n shop get secret shop-app-secrets \
            -o jsonpath='{.metadata.name}: {.metadata.creationTimestamp}'; echo

  # Final stage: actually deploy the app. Runs against the bumped
  # `main` (so it picks up the new sha-<…> image tags committed by
  # `update-manifests`) and uses the EKS demo overlay so it inherits all
  # production manifests minus TLS/cert-manager/host-rule.
  #
  # `needs: seed-secrets` guarantees `shop-app-secrets` exists before
  # any Pod that envFrom's it boots — otherwise the rollout would race
  # and CrashLoop on missing secret keys.
  deploy-eks:
    name: Deploy to EKS
    needs: [update-manifests, seed-secrets]
    if: vars.EKS_CLUSTER_NAME != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout main (post-bump, with new image tags)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Point kubectl at the EKS cluster
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Apply EKS overlay
        run: |
          # `kubectl apply -k` uses kubectl's built-in kustomize, no extra
          # install needed. The overlay references ../../k8s, so the
          # checkout must include both paths (it does — single-repo).
          kubectl apply -k infra/aws/eks-overlay/

      - name: Wait for rollout
        run: |
          set -e
          for d in api-gateway web user-svc shop-svc order-svc; do
            echo "── rollout: $d ──"
            kubectl -n shop rollout status "deployment/$d" --timeout=5m
          done

      - name: Print public URL
        run: |
          HOST=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -z "$HOST" ]; then
            echo "::warning::ingress-nginx ELB has no hostname yet (still provisioning?)."
            kubectl -n ingress-nginx get svc ingress-nginx-controller
            exit 0
          fi
          echo "App is live at: http://$HOST"
          echo "APP_URL=http://$HOST" >> "$GITHUB_ENV"
          echo "## Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "[http://$HOST](http://$HOST)" >> "$GITHUB_STEP_SUMMARY"
