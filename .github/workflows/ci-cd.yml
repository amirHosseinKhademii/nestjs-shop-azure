name: CI — user-svc, api-gateway, shop-svc & order-svc

on:
  push:
    branches: [main]
    paths:
      - 'apps/user-svc/**'
      - 'apps/api-gateway/**'
      - 'apps/shop-svc/**'
      - 'apps/order-svc/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-user-api-gateway.yml'
      - '.github/actions/**'
      - '.prettierrc'
      - '.prettierignore'
      - 'apps/user-svc/eslint.config.mjs'
      - 'apps/user-svc/jest.config.cjs'
      - 'apps/user-svc/tsconfig.build.json'
      - 'apps/api-gateway/eslint.config.mjs'
      - 'apps/api-gateway/jest.config.cjs'
      - 'apps/api-gateway/tsconfig.build.json'
      - 'apps/shop-svc/eslint.config.mjs'
      - 'apps/shop-svc/jest.config.cjs'
      - 'apps/shop-svc/tsconfig.build.json'
      - 'apps/order-svc/eslint.config.mjs'
      - 'apps/order-svc/jest.config.cjs'
      - 'apps/order-svc/tsconfig.build.json'
      - 'apps/user-svc/Dockerfile'
      - 'apps/api-gateway/Dockerfile'
      - 'apps/shop-svc/Dockerfile'
      - 'apps/order-svc/Dockerfile'
  pull_request:
    branches: [main]
    paths:
      - 'apps/user-svc/**'
      - 'apps/api-gateway/**'
      - 'apps/shop-svc/**'
      - 'apps/order-svc/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ci-user-api-gateway.yml'
      - '.github/actions/**'
      - '.prettierrc'
      - '.prettierignore'
      - 'apps/user-svc/eslint.config.mjs'
      - 'apps/user-svc/jest.config.cjs'
      - 'apps/user-svc/tsconfig.build.json'
      - 'apps/api-gateway/eslint.config.mjs'
      - 'apps/api-gateway/jest.config.cjs'
      - 'apps/api-gateway/tsconfig.build.json'
      - 'apps/shop-svc/eslint.config.mjs'
      - 'apps/shop-svc/jest.config.cjs'
      - 'apps/shop-svc/tsconfig.build.json'
      - 'apps/order-svc/eslint.config.mjs'
      - 'apps/order-svc/jest.config.cjs'
      - 'apps/order-svc/tsconfig.build.json'
      - 'apps/user-svc/Dockerfile'
      - 'apps/api-gateway/Dockerfile'
      - 'apps/shop-svc/Dockerfile'
      - 'apps/order-svc/Dockerfile'

concurrency:
  group: ci-user-gateway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Pre build (format, lint, typecheck, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Prettier
        run: pnpm run format:check

      - name: Lint, typecheck, test (turbo)
        run: pnpm exec turbo run lint typecheck test --filter='./apps/*-svc' --filter=@shop/api-gateway

  build:
    name: Build (Nest)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build (turbo)
        run: pnpm run build:services

  docker:
    name: Containerize (tag only)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Docker build context
        run: mkdir -p packages

      - name: Docker build user-svc
        run: |
          docker build \
            -f apps/user-svc/Dockerfile \
            -t shop-nest/user-svc:${{ github.sha }} \
            -t shop-nest/user-svc:ci \
            .

      - name: Docker build api-gateway
        run: |
          docker build \
            -f apps/api-gateway/Dockerfile \
            -t shop-nest/api-gateway:${{ github.sha }} \
            -t shop-nest/api-gateway:ci \
            .

      - name: Docker build shop-svc
        run: |
          docker build \
            -f apps/shop-svc/Dockerfile \
            -t shop-nest/shop-svc:${{ github.sha }} \
            -t shop-nest/shop-svc:ci \
            .

      - name: Docker build order-svc
        run: |
          docker build \
            -f apps/order-svc/Dockerfile \
            -t shop-nest/order-svc:${{ github.sha }} \
            -t shop-nest/order-svc:ci \
            .

      - name: List images
        run: |
          echo "user-svc"
          docker images shop-nest/user-svc --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'
          echo "api-gateway"
          docker images shop-nest/api-gateway --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'
          echo "shop-svc"
          docker images shop-nest/shop-svc --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'
          echo "order-svc"
          docker images shop-nest/order-svc --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'
