name: CI — CD pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/ci-cd.yml"
      - ".github/actions/**"
  pull_request:
    branches: [ main ]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/ci-cd.yml"
      - ".github/actions/**"

concurrency:
  group: ci-user-gateway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Prettier (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Prettier
        run: pnpm run format:check

  verify:
    name: Verify (${{ matrix.service }})
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-svc, shop-svc, order-svc, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.service }}-

      - name: Lint, typecheck, test
        run: pnpm exec turbo run lint typecheck test --filter=@shop/${{ matrix.service }}

  build:
    name: Build (${{ matrix.service }})
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-svc, shop-svc, order-svc, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.service }}-

      - name: Build
        run: pnpm exec turbo run build --filter=@shop/${{ matrix.service }}

  docker:
    name: Build & push image (${{ matrix.service }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-svc, shop-svc, order-svc, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve namespace
        id: ns
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "::error::Set repo variable DOCKERHUB_NAMESPACE (Settings → Variables) or secret DOCKERHUB_USERNAME"
            exit 1
          fi
          echo "namespace=$DOCKERHUB_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ns.outputs.namespace }}/shop-${{ matrix.service }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=shop-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=shop-${{ matrix.service }}
          provenance: false

  # Bump the image tags inside infra/k8s/kustomization.yaml to the immutable
  # short-SHA produced by the `docker` job, then commit back to main. ArgoCD /
  # Flux (or a manual `kubectl apply -k infra/k8s/`) will pick up the new tag.
  #
  # Pushes made with GITHUB_TOKEN do NOT re-trigger workflows (GitHub safety
  # rule), so this is loop-safe even without the `[skip ci]` marker.
  update-manifests:
    name: Bump k8s image tags
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Push back to the same branch (only meaningful for branch pushes;
          # tag pushes also bump main so the next deploy picks them up).
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve namespace
        id: ns
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "::error::Set repo variable DOCKERHUB_NAMESPACE or secret DOCKERHUB_USERNAME"
            exit 1
          fi
          echo "namespace=$DOCKERHUB_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Compute tag
        id: tag
        run: |
          # Match the tag produced by docker/metadata-action's `type=sha,format=short`
          SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "value=sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Bump image tags
        working-directory: infra/k8s
        env:
          NS: ${{ steps.ns.outputs.namespace }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          for svc in api-gateway web user-svc shop-svc order-svc; do
            kustomize edit set image \
              "docker.io/${NS}/shop-${svc}=docker.io/${NS}/shop-${svc}:${TAG}"
          done
          echo "── kustomization.yaml after bump ──"
          cat kustomization.yaml

      - name: Commit & push
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          if git diff --quiet infra/k8s/kustomization.yaml; then
            echo "No image tag changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/kustomization.yaml
          git commit -m "chore(k8s): bump image tags to ${TAG} [skip ci]"
          git push origin HEAD:main
