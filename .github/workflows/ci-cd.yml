name: CI — CD pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/ci-cd.yml"
      - ".github/actions/**"
  pull_request:
    branches: [ main ]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/ci-cd.yml"
      - ".github/actions/**"

concurrency:
  group: ci-user-gateway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Prettier (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Prettier
        run: pnpm run format:check

  verify:
    name: Verify (${{ matrix.service }})
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-svc, shop-svc, order-svc, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.service }}-

      - name: Lint, typecheck, test
        run: pnpm exec turbo run lint typecheck test --filter=@shop/${{ matrix.service }}

  build:
    name: Build (${{ matrix.service }})
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-svc, shop-svc, order-svc, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup & install
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.service }}-

      - name: Build
        run: pnpm exec turbo run build --filter=@shop/${{ matrix.service }}

  docker:
    name: Build & push image (${{ matrix.service }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, user-svc, shop-svc, order-svc, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve namespace
        id: ns
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "::error::Set repo variable DOCKERHUB_NAMESPACE (Settings → Variables) or secret DOCKERHUB_USERNAME"
            exit 1
          fi
          echo "namespace=$DOCKERHUB_NAMESPACE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ns.outputs.namespace }}/shop-${{ matrix.service }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=shop-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=shop-${{ matrix.service }}
          provenance: false
