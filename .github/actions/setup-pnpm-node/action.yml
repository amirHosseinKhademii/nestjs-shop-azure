name: Setup Node + pnpm (Corepack) + install
description: Node 24 + Corepack. setup-node pnpm cache is omitted because it requires pnpm before Corepack runs.

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Enable pnpm via Corepack
      shell: bash
      run: |
        corepack enable
        PNPM_VER=$(node -p "require('./package.json').packageManager.replace(/^pnpm@/,'')")
        corepack prepare "pnpm@${PNPM_VER}" --activate
        pnpm --version

    - name: Install
      shell: bash
      run: pnpm install --frozen-lockfile
