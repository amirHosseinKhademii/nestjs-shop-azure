name: Setup Node + pnpm (Corepack) + install
description: Node 24 + Corepack reads pnpm version from root package.json packageManager (no pnpm/action-setup).

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Enable Corepack (pnpm from packageManager)
      shell: bash
      run: corepack enable

    - name: Install
      shell: bash
      run: pnpm install --frozen-lockfile
