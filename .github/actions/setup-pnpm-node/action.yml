name: Setup pnpm + Node + install
description: Uses packageManager from root package.json (no duplicate version pin).

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install
      shell: bash
      run: pnpm install --frozen-lockfile
